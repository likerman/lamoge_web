<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Conteo de Plantas - Satélite (ESRI)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<style>
  #map { height: 100vh; }

  #panel {
    position: absolute; top: 10px; left: 70px; z-index: 1000;
    background: white; padding: 10px; border-radius: 6px;
    font-family: sans-serif; box-shadow: 0 0 10px rgba(0,0,0,0.2);
    max-width: 280px;
  }
  #panel label { display: inline-block; width: 140px; margin-bottom: 8px; }
  #panel input { width: 80px; margin-bottom: 8px; }
  button { margin-top: 5px; margin-right: 5px; }
  #progress { margin-top: 10px; font-size: 12px; color: #333; display: none; }
  .progress-bar { width: 100%; background-color: #f0f0f0; border-radius: 4px; margin-top: 5px; }
  .progress-fill { height: 8px; background-color: #4caf50; width: 0%; border-radius: 4px; transition: width 0.2s; }
  #info { margin-top: 10px; font-size: 11px; background: #f8f8f8; padding: 5px; border-radius: 4px; word-break: break-word; }

  .legend {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: white;
    padding: 10px;
    font-size: 12px;
    border-radius: 6px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    line-height: 14px;
  }
  .legend .box {
    width: 160px;
    height: 12px;
    background: linear-gradient(to right,
      hsl(120,80%,50%),
      hsl(90,80%,50%),
      hsl(60,80%,50%),
      hsl(30,80%,50%),
      hsl(0,80%,50%)
    );
    margin-bottom: 6px;
  }
</style>
</head>
<body>

<div id="panel">
  <label>Nivel de zoom:</label>
  <input id="zoomLevel" type="number" min="10" max="20" value="17" step="1"><br>

  <label>Umbral intensidad:</label>
  <input id="threshold" type="number" value="60" step="5"><br>

  <!-- 🔥 NUEVO CHECKBOX -->
  <label>Subdividir tile en 4:</label>
  <input id="splitTiles" type="checkbox"><br>

  <button id="run">Procesar Tiles</button>
  <button id="download">Descargar XYZ</button>
  <button id="testTile">Probar un tile</button>

  <div id="progress">
    <span id="progress-text">Procesando...</span>
    <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
  </div>

  <div id="info">Esperando procesamiento...</div>
</div>

<div id="map"></div>

<div class="legend">
  <b>Densidad (baja → alta)</b><br>
  <div class="box"></div>
  Verde = baja<br>
  Rojo = alta
</div>

<script>
var map = L.map('map').setView([-37.5, -69.15], 14);

var argenmap = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { maxZoom: 20, minZoom: 3,
    attribution: "Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics"
  }
).addTo(map);

var drawnItems = new L.FeatureGroup().addTo(map);
var drawControl = new L.Control.Draw({
  draw: { polyline:false, polygon:false, marker:false, circle:false, circlemarker:false },
  edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

var userRect = null;
var resultsLayer = L.layerGroup().addTo(map);

map.on(L.Draw.Event.CREATED, function (event) {
  drawnItems.clearLayers();
  userRect = event.layer;
  drawnItems.addLayer(userRect);
  resultsLayer.clearLayers();
  document.getElementById("info").innerHTML = "Rectángulo seleccionado.";
});

function getTilesInBounds(bounds, zoom) {
  const sw = map.project(bounds.getSouthWest(), zoom);
  const ne = map.project(bounds.getNorthEast(), zoom);
  const tileSize = 256;
  const minX = Math.floor(sw.x / tileSize);
  const maxX = Math.floor(ne.x / tileSize);
  const minY = Math.floor(ne.y / tileSize);
  const maxY = Math.floor(sw.y / tileSize);
  let tiles = [];

  for (let x = minX; x <= maxX; x++) {
    for (let y = minY; y <= maxY; y++) {
      const topLeft = L.point(x * tileSize, y * tileSize);
      const bottomRight = L.point((x + 1) * tileSize, (y + 1) * tileSize);
      const northWest = map.unproject(topLeft, zoom);
      const southEast = map.unproject(bottomRight, zoom);
      const tileBounds = L.latLngBounds(
        L.latLng(southEast.lat, northWest.lng),
        L.latLng(northWest.lat, southEast.lng)
      );
      tiles.push({
        x, y,
        bounds: tileBounds,
        center: tileBounds.getCenter(),
        url:
          "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/" +
          zoom + "/" + y + "/" + x
      });
    }
  }
  return tiles;
}

function countDarkPixels(imageData, threshold) {
  let data = imageData.data;
  let total = 0;
  for (let i = 0; i < data.length; i += 4) {
    let intensity = (data[i] + data[i+1] + data[i+2]) / 3;
    if (intensity < threshold) total++;
  }
  return total;
}

function tileAreaInMeters(bounds) {
  const R = 6378137;
  const latCenter = (bounds.getNorth() + bounds.getSouth()) / 2;
  const deltaLat = Math.abs(bounds.getNorth() - bounds.getSouth());
  const deltaLng = Math.abs(bounds.getEast() - bounds.getWest());
  const latM = deltaLat * (Math.PI / 180) * R;
  const lngM = deltaLng * (Math.PI / 180) * R * Math.cos(latCenter * Math.PI / 180);
  return latM * lngM;
}

function loadImage(url, timeout = 10000) {
  return new Promise((resolve, reject) => {
    let img = new Image();
    img.crossOrigin = "Anonymous";
    let timer = setTimeout(() => reject(new Error("Timeout")), timeout);
    img.onload = () => { clearTimeout(timer); resolve(img); };
    img.onerror = () => { clearTimeout(timer); reject(new Error("Error de carga")); };
    img.src = url;
  });
}

let results = [];

/* ============================================================
   🔥 NUEVO → Procesar subdivisión en 4 subtile de 128×128
   ============================================================ */
function processTileSubtiles(img, tile, threshold) {
  let canvas = document.createElement("canvas");
  canvas.width = 256;
  canvas.height = 256;
  let ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);

  let subtiles = [];

  for (let i = 0; i < 2; i++) {
    for (let j = 0; j < 2; j++) {

      let x0 = i * 128;
      let y0 = j * 128;

      let imgData = ctx.getImageData(x0, y0, 128, 128);
      let count = countDarkPixels(imgData, threshold);

      // Generar bounds geográficos del sub-tile
      let b = tile.bounds;
      let latMid = (b.getNorth() + b.getSouth()) / 2;
      let lngMid = (b.getEast() + b.getWest()) / 2;

      let subBounds;
      if (i === 0 && j === 0) subBounds = L.latLngBounds([latMid, b.getWest()], [b.getNorth(), lngMid]);
      if (i === 1 && j === 0) subBounds = L.latLngBounds([latMid, lngMid], [b.getNorth(), b.getEast()]);
      if (i === 0 && j === 1) subBounds = L.latLngBounds([b.getSouth(), b.getWest()], [latMid, lngMid]);
      if (i === 1 && j === 1) subBounds = L.latLngBounds([b.getSouth(), lngMid], [latMid, b.getEast()]);

      let area = tileAreaInMeters(subBounds);
      let density = count / area;

      subtiles.push({
        lat: subBounds.getCenter().lat,
        lng: subBounds.getCenter().lng,
        bounds: subBounds,
        count: count,
        density: density
      });
    }
  }

  return subtiles;
}

/* ============================================================
   🔥 PROCESO PRINCIPAL
   ============================================================ */
async function processTiles() {
  if (!userRect) { alert("Dibuje un rectángulo primero"); return; }

  let ZOOM = parseInt(document.getElementById("zoomLevel").value);
  let split = document.getElementById("splitTiles").checked;

  map.fitBounds(userRect.getBounds(), { maxZoom: ZOOM });

  resultsLayer.clearLayers();
  results = [];

  let bounds = userRect.getBounds();
  let tiles = getTilesInBounds(bounds, ZOOM);
  let totalTiles = tiles.length;

  if (totalTiles === 0) { alert("No hay tiles."); return; }

  let threshold = parseInt(document.getElementById("threshold").value);

  let processed = 0;
  let counts = [];
  let failed = 0;

  let progressDiv = document.getElementById("progress");
  let progressText = document.getElementById("progress-text");
  let progressFill = document.getElementById("progress-fill");
  progressDiv.style.display = "block";

  for (let tile of tiles) {
    processed++;
    progressFill.style.width = (processed / totalTiles * 100) + "%";
    progressText.innerText = `Tile ${processed}/${totalTiles}`;

    let img;
    try {
      img = await loadImage(tile.url);
    } catch (e) {
      failed++; continue;
    }

    /* =============================
       🔥 Si está activo el checkbox
       subdividimos en 4
       ============================= */
    if (split) {
      let subtiles = processTileSubtiles(img, tile, threshold);
      for (let s of subtiles) {
        let density = s.density;
        counts.push(s.count);

        let maxDensity = 0.1;
        let intensity = Math.min(1, density / maxDensity);
        let hue = (1 - intensity) * 120;

        L.rectangle(s.bounds, {
          color: `hsl(${hue},80%,50%)`,
          weight: 1,
          fillOpacity: 0.6
        }).addTo(resultsLayer);

        results.push({
          lat: s.lat,
          lng: s.lng,
          density: s.density,
          count: s.count,
          bounds: s.bounds
        });
      }

      continue;
    }

    /* =============================
       🔥 Modo normal (sin subdividir)
       ============================= */
    let canvas = document.createElement("canvas");
    canvas.width = 256;
    canvas.height = 256;
    let ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);

    let imageData;
    try { imageData = ctx.getImageData(0, 0, 256, 256); }
    catch(e) { failed++; continue; }

    let plantCount = countDarkPixels(imageData, threshold);
    counts.push(plantCount);

    let tileArea = tileAreaInMeters(tile.bounds);
    let density = plantCount / tileArea;

    results.push({
      lng: tile.center.lng,
      lat: tile.center.lat,
      count: plantCount,
      density: density,
      bounds: tile.bounds
    });

    let maxDensity = 0.1;
    let intensity = Math.min(1, density / maxDensity);
    let hue = (1 - intensity) * 120;

    L.rectangle(tile.bounds, {
      color: `hsl(${hue}, 80%, 50%)`,
      weight: 1,
      fillOpacity: 0.6
    }).addTo(resultsLayer);
  }

  progressDiv.style.display = "none";

  if (!results.length) {
    document.getElementById("info").innerHTML = "No se procesó ningún tile.";
    alert("No se procesó ningún tile.");
    return;
  }

  let minCount = Math.min(...counts);
  let maxCount = Math.max(...counts);

  document.getElementById("info").innerHTML =
    `Procesados ${results.length} celdas (${failed} fallaron).<br>` +
    `Zoom: ${ZOOM} | Umbral: ${threshold}<br>` +
    `Min=${minCount}, Max=${maxCount}`;

  alert(`Terminado. Min=${minCount} Max=${maxCount}`);
}

async function testSampleTile() {
  if (!userRect) { alert("Dibuje un rectángulo primero"); return; }

  let ZOOM = parseInt(document.getElementById("zoomLevel").value);
  let tiles = getTilesInBounds(userRect.getBounds(), ZOOM);
  if (!tiles.length) return alert("No hay tiles");

  window.open(tiles[0].url, "_blank");
}

document.getElementById("download").onclick = function() {
  if (!results.length) { alert("Primero procese"); return; }
  let txt = "X Y Z\n";
  for (let r of results)
    txt += `${r.lng} ${r.lat} ${r.density}\n`;

  let blob = new Blob([txt], {type:"text/plain"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "densidad_plantas.xyz";
  a.click();
};

document.getElementById("run").onclick = processTiles;
document.getElementById("testTile").onclick = testSampleTile;

</script>
</body>
</html>
